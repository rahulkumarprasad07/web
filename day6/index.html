<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCB.COM</title>

<style>
body{
    background-color: rgb(15,15,15);
    margin: 0;
    font-family: Arial;
}


nav{
    background-color: black;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-radius: 10px;
}

.left{
    display: flex;
    align-items: center;
    color: red;
    gap: 8px;
}

.centrenav{
    flex: 1;
    display: flex;
    justify-content: center;
    color: white;
}

.centrenav span{
    color: red;
}

.nav{
    display: flex;
    gap: 25px;
    list-style: none;
    align-items: center;
    font-size: 18px;
}

.nav a{
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.nav a:hover{
    color: red;
    transform: scale(1.1);
}


.tag{
    color: gold;
    text-align: center;
    font-size: 22px;
    margin-top: 20px;
}


.middle{
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px;
}

.card{
    width: 300px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid transparent;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover{
    transform: scale(1.05);
    border-color:gold;
}


.img{
    width: 100%;
    height: 220px;
    object-fit: contain;   /* FULL IMAGE SHOW */
    background: black;
}

.name{
    text-align: center;
    margin: 10px 0;
    color:red;
}
</style>
</head>

<body>

<nav>
    <div class="left">
        <img src="rcb logo.png" height="50px">
        <h2>RCB</h2>
    </div>

    <div class="centrenav">
        <h1>"ee sala <span>cup namde</span>"</h1>
    </div>

    <ol class="nav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Squad</a></li>
        <li><a href="#">Match</a></li>
        <li><a href="#">Fan</a></li>
    </ol>
</nav>

<div class="tag">
    <h2>our star players</h2>
</div>

<section class="middle">

    <div class="card">
        <img src="virat.jpeg" class="img">
        <h2 class="name">Virat</h2>
    </div>

    <div class="card">
        <img src="rajaty.png" class="img">
        <h2 class="name">Rajat</h2>
    </div>

    <div class="card">
        <img src="bhuvi.jpeg" class="img">
        <h2 class="name">Bhuvi</h2>
    </div>

    <div class="card">
        <img src="krunal.jpeg" class="img">
        <h2 class="name">Krunal</h2>
    </div>

</section>

</body>
</html>
